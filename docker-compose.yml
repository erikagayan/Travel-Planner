services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-docker-dev-change-me}
      DEBUG: ${DEBUG:-1}
      ALLOWED_HOSTS: localhost,127.0.0.1,web,0.0.0.0
      SQLITE_PATH: /data/db.sqlite3
      REDIS_URL: redis://redis:6379/0
    volumes:
      - sqlite_data:/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  sqlite_data:
